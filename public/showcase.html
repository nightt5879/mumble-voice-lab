<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="refresh"
      content="0; url=./listen.html?v=1.1.0-continuity-presets"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mumble Voice Lab Showcase</title>
    <style>
      @font-face {
        font-family: "Nunito";
        font-weight: 900;
        src: url("/fonts/nunito/Nunito-900.woff2") format("woff2");
        font-display: swap;
      }
      @font-face {
        font-family: "Noto Sans SC";
        font-weight: 700;
        src: url("/fonts/noto-sans-sc/NotoSansSC-700.woff2") format("woff2");
        font-display: swap;
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-weight: 700;
        src: url("/fonts/jetbrains-mono/JetBrainsMono-700.woff2") format("woff2");
        font-display: swap;
      }
      :root {
        --paper: #fdf6ec;
        --paper-card: #fff8e7;
        --paper-deep: #fde68a;
        --ink: #2a1f17;
        --ink-soft: #6b5849;
        --cute: #f472b6;
        font-family: "Nunito", "Noto Sans SC", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 16%, rgba(244, 114, 182, 0.10) 0, transparent 30%),
          radial-gradient(circle at 86% 78%, rgba(56, 189, 248, 0.09) 0, transparent 32%),
          var(--paper);
      }
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }
      main {
        display: grid;
        gap: 14px;
        width: min(560px, calc(100% - 32px));
        padding: 28px 30px 32px;
        background: var(--paper-card);
        border: 2px solid var(--ink);
        border-radius: 14px;
        box-shadow: 4px 4px 0 var(--ink);
        text-align: left;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 5px 12px;
        background: var(--ink);
        color: var(--paper-deep);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-radius: 999px;
        width: fit-content;
      }
      .eyebrow::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--cute);
        box-shadow: 0 0 0 2px var(--paper-deep);
      }
      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      h1 .accent {
        color: var(--cute);
      }
      p {
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.6;
      }
      a {
        color: var(--cute);
        font-weight: 800;
        text-decoration-thickness: 2px;
        text-underline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Listening Showcase</p>
      <h1><span class="accent">Mumble</span> Voice Lab</h1>
      <p>正在打开 12 条样例试听页 / Opening the 12-clip listening showcase.</p>
      <p>
        如果没有自动跳转，请点击
        <a href="./listen.html?v=1.1.0-continuity-presets">这里 / here</a>。
      </p>
    </main>
  </body>
</html>
